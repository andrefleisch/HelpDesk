name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Build and test backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: helpdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d helpdesk_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/helpdesk_test?schema=public
      AUTH_SECRET: test-auth-secret

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy --schema src/prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate --schema src/prisma/schema.prisma

      - name: Build backend
        run: npm run build

      - name: Run tests
        run: npm test
